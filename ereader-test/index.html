<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyClaw eReader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eaeaea; min-height: 100vh; }
    
    /* Header */
    header { background: #16213e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; }
    header h1 { font-size: 1.5rem; color: #e94560; }
    header nav { display: flex; gap: 1rem; }
    header nav button { background: transparent; border: 1px solid #e94560; color: #e94560; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    header nav button:hover, header nav button.active { background: #e94560; color: #fff; }
    
    /* Views */
    .view { display: none; padding: 2rem; }
    .view.active { display: block; }
    
    /* Library View */
    .library-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .library-header h2 { font-size: 1.8rem; }
    
    /* Search */
    .search-box { display: flex; gap: 0.5rem; flex: 1; max-width: 500px; }
    .search-box input { flex: 1; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #0f3460; background: #16213e; color: #fff; font-size: 1rem; }
    .search-box button { padding: 0.75rem 1.5rem; background: #e94560; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-weight: 600; }
    .search-box button:hover { background: #d63850; }
    
    /* Book Grid */
    .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    .book-card { background: #16213e; border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .book-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(233, 69, 96, 0.2); }
    .book-cover { width: 100%; height: 240px; object-fit: cover; background: #0f3460; }
    .book-cover-placeholder { width: 100%; height: 240px; background: #0f3460; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #e94560; }
    .book-info { padding: 1rem; }
    .book-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.25rem; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .book-author { font-size: 0.8rem; color: #888; margin-bottom: 0.5rem; }
    .book-actions { display: flex; gap: 0.5rem; }
    .book-actions button { flex: 1; padding: 0.4rem; font-size: 0.75rem; border-radius: 4px; border: none; cursor: pointer; }
    .btn-save { background: #0f3460; color: #e94560; }
    .btn-remove { background: #e94560; color: #fff; }
    
    /* Reader View */
    .reader-container { display: flex; flex-direction: column; height: 100vh; width: 100%; }
    .reader-toolbar { background: #16213e; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
    .reader-toolbar button { background: #0f3460; border: none; color: #fff; padding: 0.4rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .reader-toolbar button:hover { background: #e94560; }
    .reader-toolbar input { background: #0f3460; border: 1px solid #0f3460; color: #fff; padding: 0.4rem; border-radius: 6px; width: 60px; text-align: center; font-size: 0.85rem; }
    .reader-title { flex: 1; text-align: center; font-weight: 600; color: #e94560; font-size: 0.9rem; }
    .chapter-nav { display: flex; gap: 0.5rem; align-items: center; }
    .chapter-nav select { background: #0f3460; border: none; color: #fff; padding: 0.4rem; border-radius: 6px; min-width: 150px; font-size: 0.85rem; }
    
    .reader-main { flex: 1; display: flex; overflow: hidden; min-height: 0; }
    
    /* Sidebar - Table of Contents */
    .toc-sidebar { width: 280px; background: #16213e; border-right: 1px solid #0f3460; overflow-y: auto; padding: 1rem; transition: margin-left 0.3s; flex-shrink: 0; }
    .toc-sidebar.hidden { margin-left: -280px; }
    .toc-sidebar h3 { font-size: 1rem; margin-bottom: 1rem; color: #e94560; }
    .toc-item { padding: 0.5rem; border-radius: 4px; cursor: pointer; margin-bottom: 0.25rem; font-size: 0.85rem; transition: background 0.2s; }
    .toc-item:hover { background: #0f3460; }
    .toc-item.active { background: #e94560; color: #fff; }
    
    /* Book Content Area */
    .reader-content { flex: 1; overflow-y: auto; background: #0f0f1a; display: flex; align-items: flex-start; justify-content: center; }
    .reader-content-inner { max-width: 800px; width: 100%; padding: 2rem; line-height: 1.8; font-size: 1.1rem; }
    .reader-content-inner p { margin-bottom: 1rem; }
    
    /* Page Navigation */
    .page-nav { background: #16213e; padding: 0.75rem 1rem; display: flex; justify-content: center; align-items: center; gap: 2rem; border-top: 1px solid #0f3460; flex-shrink: 0; }
    .page-nav button { background: #e94560; border: none; color: #fff; padding: 0.6rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .page-nav button:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-nav span { font-size: 0.85rem; color: #888; }
    
    /* Loading / Empty States */
    .loading, .empty-state { text-align: center; padding: 4rem; color: #888; }
    .empty-state h3 { color: #e94560; margin-bottom: 0.5rem; }
    
    /* Search Results vs Saved Toggle */
    .results-toggle { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .results-toggle button { padding: 0.5rem 1rem; background: #0f3460; border: none; color: #888; border-radius: 6px; cursor: pointer; }
    .results-toggle button.active { background: #e94560; color: #fff; }
    
    /* Modal for book details */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: #16213e; border-radius: 16px; padding: 2rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
    .modal-close { background: none; border: none; color: #888; font-size: 1.5rem; cursor: pointer; }
    .modal-book-cover { width: 120px; height: 180px; object-fit: cover; border-radius: 8px; float: left; margin-right: 1rem; }
    .modal-info h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    .modal-info p { color: #888; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .modal-desc { margin-top: 1rem; font-size: 0.9rem; line-height: 1.6; color: #ccc; }
    .modal-actions { margin-top: 1.5rem; display: flex; gap: 0.5rem; }
    .modal-actions button { flex: 1; padding: 0.75rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    .modal-actions .btn-primary { background: #e94560; color: #fff; }
    .modal-actions .btn-secondary { background: #0f3460; color: #fff; }
    
    /* Responsive */
    @media (max-width: 768px) {
      .toc-sidebar { position: fixed; left: 0; top: 60px; height: calc(100% - 60px); z-index: 100; }
      .toc-sidebar.hidden { margin-left: -100%; }
      .book-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 StudyClaw eReader</h1>
  <nav>
    <button class="active" onclick="showView('library')">Library</button>
    <button onclick="showView('reader')" id="btn-reader" style="display:none">Reader</button>
  </nav>
</header>

<!-- Library View -->
<div id="view-library" class="view active">
  <div class="library-header">
    <h2>Find Books</h2>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search by title, author, or keyword..." onkeypress="if(event.key==='Enter')searchBooks()">
      <button onclick="searchBooks()">Search</button>
    </div>
  </div>
  
  <div class="results-toggle">
    <button class="active" id="btn-show-search" onclick="showResults('search')">Search Results</button>
    <button id="btn-show-saved" onclick="showResults('saved')">My Library (<span id="saved-count">0</span>)</button>
  </div>
  
  <div id="search-results"></div>
  <div id="saved-books" style="display:none"></div>
</div>

<!-- Reader View -->
<div id="view-reader" class="view">
  <div class="reader-container">
    <div class="reader-toolbar">
      <button onclick="toggleTOC()">☰ Contents</button>
      <button onclick="prevPage()">◀ Prev</button>
      <div class="chapter-nav">
        <select id="chapter-select" onchange="goToChapter(this.value)">
          <option value="">-- Select Chapter --</option>
        </select>
      </div>
      <span class="reader-title" id="reader-title">Book Title</span>
      <div class="chapter-nav">
        <input type="number" id="page-input" min="1" placeholder="Page" onchange="goToPage(this.value)">
        <span id="page-indicator">Page 1 of 1</span>
      </div>
      <button onclick="nextPage()">Next ▶</button>
      <button onclick="closeReader()">✕ Close</button>
    </div>
    
    <div class="reader-main">
      <div class="toc-sidebar hidden" id="toc-sidebar">
        <h3>Table of Contents</h3>
        <div id="toc-list"></div>
      </div>
      <div class="reader-content" id="reader-content">
        <div class="reader-content-inner" id="reader-content-inner">
          <p>Select a book from your library to start reading.</p>
        </div>
      </div>
    </div>
    
    <div class="page-nav">
      <button onclick="prevPage()">◀ Previous Page</button>
      <span id="page-status">Page 1</span>
      <button onclick="nextPage()">Next Page ▶</button>
    </div>
  </div>
</div>

<!-- Book Detail Modal -->
<div class="modal" id="book-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title">Book Title</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <img id="modal-cover" class="modal-book-cover" src="" alt="Cover">
    <div class="modal-info">
      <p id="modal-author"></p>
      <p id="modal-year"></p>
      <p id="modal-pages"></p>
      <p id="modal-subjects"></p>
    </div>
    <p class="modal-desc" id="modal-desc"></p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="openInReader(currentBook)">📖 Read Now</button>
      <button class="btn-primary" id="modal-save-btn" onclick="toggleSave(currentBook)">+ Save to Library</button>
    </div>
  </div>
</div>

<script>
// State
let currentBook = null;
let currentPage = 1;
let totalPages = 1;
let savedBooks = JSON.parse(localStorage.getItem('ereader_books') || '[]');
let searchResults = [];
let chapters = [];

// OpenLibrary API
const OL_API = 'https://openlibrary.org';
const OL_COVER = 'https://covers.openlibrary.org/b';

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  renderSavedBooks();
  updateSavedCount();
});

function showView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  document.querySelectorAll('header nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (view === 'reader') document.getElementById('btn-reader').style.display = 'inline-block';
}

function showResults(type) {
  const show = type === 'search';
  document.getElementById('search-results').style.display = show ? 'block' : 'none';
  document.getElementById('saved-books').style.display = show ? 'none' : 'block';
  document.getElementById('btn-show-search').classList.toggle('active', show);
  document.getElementById('btn-show-saved').classList.toggle('active', !show);
}

async function searchBooks() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;
  
  const container = document.getElementById('search-results');
  container.innerHTML = '<div class="loading">Searching OpenLibrary...</div>';
  
  try {
    const res = await fetch(`${OL_API}/search.json?q=${encodeURIComponent(query)}&limit=20&fields=key,title,author_name,cover_i,first_publish_year,number_of_pages_median,subject,ia,cover_edition_key`);
    const data = await res.json();
    
    searchResults = data.docs || [];
    
    if (searchResults.length === 0) {
      container.innerHTML = '<div class="empty-state"><h3>No results found</h3><p>Try a different search term</p></div>';
      return;
    }
    
    container.innerHTML = '<div class="book-grid" id="search-grid"></div>';
    const grid = document.getElementById('search-grid');
    
    for (const book of searchResults) {
      grid.appendChild(createBookCard(book, 'search'));
    }
  } catch (err) {
    container.innerHTML = '<div class="empty-state"><h3>Search failed</h3><p>Please try again</p></div>';
  }
}

function createBookCard(book, source) {
  const isSaved = savedBooks.some(b => b.key === book.key);
  const coverUrl = book.cover_i ? `${OL_COVER}/id/${book.cover_i}-M.jpg` : null;
  
  const div = document.createElement('div');
  div.className = 'book-card';
  div.onclick = () => showBookModal(book, source);
  
  div.innerHTML = `
    ${coverUrl ? `<img class="book-cover" src="${coverUrl}" alt="${book.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
    <div class="book-cover-placeholder" ${coverUrl ? 'style="display:none"' : ''}>📖</div>
    <div class="book-info">
      <div class="book-title">${book.title}</div>
      <div class="book-author">${book.author_name ? book.author_name.join(', ') : 'Unknown Author'}</div>
      ${book.first_publish_year ? `<div class="book-author">First published: ${book.first_publish_year}</div>` : ''}
      <div class="book-actions" onclick="event.stopPropagation()">
        ${source === 'saved' 
          ? `<button class="btn-remove" onclick="removeBook('${book.key}')">✕ Remove</button>`
          : `<button class="btn-save" onclick="saveBook('${book.key}')">${isSaved ? '✓ Saved' : '+ Save'}</button>`
        }
      </div>
    </div>
  `;
  return div;
}

async function showBookModal(book, source) {
  currentBook = book;
  
  document.getElementById('modal-title').textContent = book.title;
  document.getElementById('modal-author').textContent = `Author: ${book.author_name ? book.author_name.join(', ') : 'Unknown'}`;
  document.getElementById('modal-year').textContent = `First published: ${book.first_publish_year || 'Unknown'}`;
  document.getElementById('modal-pages').textContent = `Pages: ${book.number_of_pages_median || 'Unknown'}`;
  document.getElementById('modal-subjects').textContent = `Subjects: ${(book.subject || []).slice(0,3).join(', ')}`;
  
  const coverUrl = book.cover_i ? `${OL_COVER}/id/${book.cover_i}-L.jpg` : null;
  document.getElementById('modal-cover').src = coverUrl || '';
  document.getElementById('modal-cover').style.display = coverUrl ? 'block' : 'none';
  
  // Get description
  let desc = '';
  if (book.key) {
    try {
      const res = await fetch(`${OL_API}${book.key}.json`);
      const data = await res.json();
      desc = data.description ? (typeof data.description === 'string' ? data.description : data.description.value) : '';
    } catch {}
  }
  document.getElementById('modal-desc').textContent = desc || 'No description available.';
  
  const isSaved = savedBooks.some(b => b.key === book.key);
  const saveBtn = document.getElementById('modal-save-btn');
  saveBtn.textContent = isSaved ? '✓ In Library' : '+ Save to Library';
  saveBtn.onclick = () => toggleSave(book);
  
  document.getElementById('book-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('book-modal').classList.remove('active');
}

function saveBook(key) {
  const book = searchResults.find(b => b.key === key) || savedBooks.find(b => b.key === key);
  if (!book || savedBooks.some(b => b.key === key)) return;
  
  savedBooks.push(book);
  localStorage.setItem('ereader_books', JSON.stringify(savedBooks));
  renderSavedBooks();
  updateSavedCount();
  
  // Refresh current view
  if (document.getElementById('search-results').style.display !== 'none') {
    document.getElementById('search-results').innerHTML = '<div class="book-grid" id="search-grid"></div>';
    searchResults.forEach(b => document.getElementById('search-grid').appendChild(createBookCard(b, 'search')));
  }
}

function removeBook(key) {
  savedBooks = savedBooks.filter(b => b.key !== key);
  localStorage.setItem('ereader_books', JSON.stringify(savedBooks));
  renderSavedBooks();
  updateSavedCount();
}

function toggleSave(book) {
  if (savedBooks.some(b => b.key === book.key)) {
    removeBook(book.key);
  } else {
    saveBook(book.key);
  }
  closeModal();
}

function renderSavedBooks() {
  const container = document.getElementById('saved-books');
  if (savedBooks.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>Your library is empty</h3><p>Search for books and save them to build your library</p></div>';
    return;
  }
  container.innerHTML = '<div class="book-grid"></div>';
  const grid = container.querySelector('.book-grid');
  savedBooks.forEach(book => grid.appendChild(createBookCard(book, 'saved')));
}

function updateSavedCount() {
  document.getElementById('saved-count').textContent = savedBooks.length;
}

// Reader Functions
function openInReader(book) {
  currentBook = book;
  currentPage = 1;
  chapters = [];
  
  closeModal();
  showView('reader');
  document.getElementById('btn-reader').click();
  
  document.getElementById('reader-title').textContent = book.title;
  document.getElementById('chapter-select').innerHTML = '<option value="">-- Select Chapter --</option>';
  document.getElementById('toc-list').innerHTML = '<p style="color:#888;font-size:0.85rem;">Loading...</p>';
  
  loadBookContent(book);
}

async function loadBookContent(book) {
  const container = document.getElementById('reader-content-inner');
  
  // Try to get the Internet Archive ID for this book
  let iaId = null;
  if (book.ia && book.ia.length > 0) {
    iaId = book.ia[0];
  } else if (book.cover_edition_key) {
    // Try to get IA from edition
    try {
      const res = await fetch(`${OL_API}/books/${book.cover_edition_key}.json`);
      const data = await res.json();
      iaId = data.identifiers?.internetarchive?.[0] || data.identifiers?.archiveorg?.[0];
    } catch {}
  }
  
  if (iaId) {
    // Use Internet Archive for full text
    container.innerHTML = `<iframe src="https://archive.org/embed/${iaId}?output=html" style="width:100%;height:100%;border:none;" title="Book reader"></iframe>`;
    document.getElementById('page-indicator').textContent = 'Internet Archive Viewer';
    document.getElementById('page-status').textContent = 'Viewing via Internet Archive';
  } else {
    // Fallback: Try OpenLibrary's read preview
    container.innerHTML = '<div class="loading"><p>Loading preview...</p></div>';
    
    try {
      // Get work details for preview
      const workRes = await fetch(`${OL_API}${book.key}.json`);
      const workData = await workRes.json();
      
      // Check for first representative edition with full text
      if (workData.excerpts && workData.excerpts.length > 0) {
        container.innerHTML = workData.excerpts.map(e => `<p>${e.text}</p>`).join('');
        totalPages = Math.ceil(workData.excerpts.length / 3);
      } else {
        // Show book info and links to external reader
        container.innerHTML = `
          <div style="text-align:center;padding:2rem;">
            <p style="font-size:3rem;margin-bottom:1rem;">📖</p>
            <h3 style="color:#e94560;margin-bottom:1rem;">Preview Not Available</h3>
            <p style="color:#888;margin-bottom:2rem;">This book doesn't have a full preview available in OpenLibrary.</p>
            <p style="color:#888;margin-bottom:1rem;">Try these options:</p>
            <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
              <button onclick="window.open('https://openlibrary.org${book.key}','_blank')" style="background:#e94560;color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;">View on OpenLibrary</button>
              <button onclick="searchInternetArchive('${book.title} ${book.author_name ? book.author_name[0] : ''}')" style="background:#0f3460;color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;">Search Internet Archive</button>
            </div>
          </div>
        `;
      }
    } catch (err) {
      container.innerHTML = '<div class="empty-state"><h3>Could not load book</h3><p>Please try searching Internet Archive instead.</p></div>';
    }
  }
}

function searchInternetArchive(query) {
  window.open(`https://archive.org/search?q=${encodeURIComponent(query)}`, '_blank');
}

function closeReader() {
  showView('library');
  document.querySelectorAll('header nav button')[0].click();
}

function toggleTOC() {
  document.getElementById('toc-sidebar').classList.toggle('hidden');
}

function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    updatePageDisplay();
  }
}

function nextPage() {
  currentPage++;
  updatePageDisplay();
}

function goToPage(page) {
  const p = parseInt(page);
  if (p >= 1 && p <= totalPages) {
    currentPage = p;
    updatePageDisplay();
  }
}

function goToChapter(chapterKey) {
  if (chapterKey) {
    // Scroll to chapter or load it
    const el = document.querySelector(`[data-chapter="${chapterKey}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  }
}

function updatePageDisplay() {
  document.getElementById('page-input').value = currentPage;
  document.getElementById('page-indicator').textContent = `Page ${currentPage} of ${totalPages}`;
  document.getElementById('page-status').textContent = `Page ${currentPage}`;
  
  // Scroll to top of content
  document.getElementById('reader-content').scrollTop = 0;
}

// Export/Import library
function exportLibrary() {
  const data = JSON.stringify(savedBooks, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'studyclaw-library.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importLibrary(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (Array.isArray(imported)) {
        // Merge with existing, avoiding duplicates
        const existingKeys = new Set(savedBooks.map(b => b.key));
        const newBooks = imported.filter(b => !existingKeys.has(b.key));
        savedBooks = [...savedBooks, ...newBooks];
        localStorage.setItem('ereader_books', JSON.stringify(savedBooks));
        renderSavedBooks();
        updateSavedCount();
        alert(`Imported ${newBooks.length} new books!`);
      }
    } catch {
      alert('Invalid library file');
    }
  };
  reader.readAsText(file);
}
</script>

</body>
</html>
